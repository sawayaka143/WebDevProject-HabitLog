<div class="login-wrap">
  <div class="login-box">
    <h1 class="brand">HabitLog<span class="brand-accent">_</span></h1>
    <p class="sub">// sign in to the workspace</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <label>username</label>
      <input type="text" formControlName="username" placeholder="admin" autocomplete="username" spellcheck="false"/>

      <label>password</label>
      <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password"/>

      <button type="submit" [disabled]="loginForm.invalid">login()</button>
    </form>
  </div>
</div>
